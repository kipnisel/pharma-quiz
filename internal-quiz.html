<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון פנימיות ב'</title>
    <link rel="stylesheet" href="internal-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>חידון פנימיות ב'</h1>
            <p class="subtitle">המטולוגיה, דרמטולוגיה, אונקולוגיה, אימונולוגיה ונוירולוגיה</p>
        </header>

        <div id="stats" class="stats">
            <div class="stat-item">
                <span class="stat-label">שאלה:</span>
                <span id="question-number">1</span> / <span id="total-questions">10</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ניקוד:</span>
                <span id="score">0</span>
            </div>
        </div>

        <div id="quiz-container" class="quiz-container">
            <div id="question-card" class="question-card">
                <div id="question-category" class="question-category"></div>
                <h2 id="question-text" class="question-text"></h2>
                <div id="options" class="options"></div>
            </div>

            <div id="feedback" class="feedback hidden">
                <div id="feedback-icon" class="feedback-icon"></div>
                <p id="feedback-text"></p>
                <p id="explanation" class="explanation"></p>
            </div>

            <button id="next-btn" class="btn next-btn hidden">השאלה הבאה</button>
        </div>

        <div id="results" class="results hidden">
            <h2>סיכום</h2>
            <div class="results-score">
                <span id="final-score">0</span> / <span id="final-total">10</span>
            </div>
            <p id="results-message"></p>
            <button id="restart-btn" class="btn">התחל מחדש</button>
        </div>

        <div id="settings" class="settings">
            <h3>הגדרות</h3>
            <div class="setting-item">
                <label for="question-count">מספר שאלות:</label>
                <select id="question-count">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
            <div class="setting-item">
                <label for="category-select">קטגוריה:</label>
                <select id="category-select">
                    <option value="all" selected>הכל</option>
                    <option value="מרכיבי דם והמטופואזיס">מרכיבי דם והמטופואזיס</option>
                    <option value="אנמיות והפרעות המטולוגיות">אנמיות והפרעות המטולוגיות</option>
                    <option value="מחלות עור">מחלות עור</option>
                    <option value="מבוא לאונקולוגיה ואבחון">מבוא לאונקולוגיה ואבחון</option>
                    <option value="לוקמיות ולימפומות">לוקמיות ולימפומות</option>
                    <option value="טיפולים אונקולוגיים">טיפולים אונקולוגיים</option>
                    <option value="מערכת החיסון ו-HIV">מערכת החיסון ו-HIV</option>
                    <option value="תגובות אלרגיות ואנפילקסיס">תגובות אלרגיות ואנפילקסיס</option>
                    <option value="מחלות ראומטיות ואוטואימוניות">מחלות ראומטיות ואוטואימוניות</option>
                    <option value="נוירולוגיה">נוירולוגיה</option>
                </select>
            </div>
            <button id="start-btn" class="btn start-btn">התחל חידון</button>
        </div>
        <div class="nav-links">
            <a href="nursing-quiz.html" class="nav-link">חידון סיעודי</a>
            <a href="nutrition-quiz.html" class="nav-link">חידון תזונה ודיאטטיקה</a>
        </div>
    </div>

    <script src="internal.js"></script>
    <script src="internal-quiz.js"></script>
</body>
</html>
