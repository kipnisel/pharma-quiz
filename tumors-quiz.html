<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון היסטולוגיה - סוגי רקמות וגידולים</title>
    <link rel="stylesheet" href="tumors-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>חידון פתולוגיה 1</h1>
            <p class="subtitle">היסטולוגיה, גידולים, דלקת, המודינמיה וסוכרת</p>
        </header>

        <div id="stats" class="stats">
            <div class="stat-item">
                <span class="stat-label">שאלה:</span>
                <span id="question-number">1</span> / <span id="total-questions">10</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ניקוד:</span>
                <span id="score">0</span>
            </div>
        </div>

        <div id="quiz-container" class="quiz-container">
            <div id="question-card" class="question-card">
                <div id="question-category" class="question-category"></div>
                <h2 id="question-text" class="question-text"></h2>
                <div id="options" class="options"></div>
            </div>

            <div id="feedback" class="feedback hidden">
                <div id="feedback-icon" class="feedback-icon"></div>
                <p id="feedback-text"></p>
                <p id="explanation" class="explanation"></p>
            </div>

            <button id="next-btn" class="btn next-btn hidden">השאלה הבאה</button>
        </div>

        <div id="results" class="results hidden">
            <h2>סיכום</h2>
            <div class="results-score">
                <span id="final-score">0</span> / <span id="final-total">10</span>
            </div>
            <p id="results-message"></p>
            <button id="restart-btn" class="btn">התחל מחדש</button>
        </div>

        <div id="settings" class="settings">
            <h3>הגדרות</h3>
            <div class="setting-item">
                <label for="question-count">מספר שאלות:</label>
                <select id="question-count">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="50">50</option>
                </select>
            </div>
            <div class="setting-item">
                <label for="category-select">קטגוריה:</label>
                <select id="category-select">
                    <option value="all" selected>הכל</option>
                    <option value="מבוא לפתולוגיה">מבוא לפתולוגיה</option>
                    <option value="סוגי רקמות">סוגי רקמות</option>
                    <option value="מונחים כלליים">מונחים כלליים</option>
                    <option value="גידולים אפיתליאליים">גידולים אפיתליאליים</option>
                    <option value="גידולים מזנכימאליים">גידולים מזנכימאליים</option>
                    <option value="ניאופלזיה">ניאופלזיה</option>
                    <option value="הפרעות המודינמיות">הפרעות המודינמיות</option>
                    <option value="דלקת">דלקת</option>
                    <option value="שאלות מעורבות">שאלות מעורבות</option>
                </select>
            </div>
            <button id="start-btn" class="btn start-btn">התחל חידון</button>
        </div>
    </div>

    <script src="tumors.js"></script>
    <script src="tumors-quiz.js"></script>
</body>
</html>
