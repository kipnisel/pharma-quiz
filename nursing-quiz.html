<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון סיעודי</title>
    <link rel="stylesheet" href="nursing-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>חידון סיעודי</h1>
            <p class="subtitle">בדיקות מעבדה, מתן חמצן וחשיבה קלינית</p>
        </header>

        <div id="stats" class="stats">
            <div class="stat-item">
                <span class="stat-label">שאלה:</span>
                <span id="question-number">1</span> / <span id="total-questions">10</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ניקוד:</span>
                <span id="score">0</span>
            </div>
        </div>

        <div id="quiz-container" class="quiz-container">
            <div id="question-card" class="question-card">
                <div id="question-category" class="question-category"></div>
                <h2 id="question-text" class="question-text"></h2>
                <div id="options" class="options"></div>
            </div>

            <div id="feedback" class="feedback hidden">
                <div id="feedback-icon" class="feedback-icon"></div>
                <p id="feedback-text"></p>
                <p id="explanation" class="explanation"></p>
            </div>

            <button id="next-btn" class="btn next-btn hidden">השאלה הבאה</button>
        </div>

        <div id="results" class="results hidden">
            <h2>סיכום</h2>
            <div class="results-score">
                <span id="final-score">0</span> / <span id="final-total">10</span>
            </div>
            <p id="results-message"></p>
            <button id="restart-btn" class="btn">התחל מחדש</button>
        </div>

        <div id="settings" class="settings">
            <h3>הגדרות</h3>
            <div class="setting-item">
                <label for="question-count">מספר שאלות:</label>
                <select id="question-count">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
            <div class="setting-item">
                <label for="category-select">קטגוריה:</label>
                <select id="category-select">
                    <option value="all" selected>הכל</option>
                    <option value="ספירת דם">ספירת דם</option>
                    <option value="תפקודי קרישה">תפקודי קרישה</option>
                    <option value="כימיה">כימיה</option>
                    <option value="בלוטת התריס">בלוטת התריס</option>
                    <option value="גזים בדם">גזים בדם</option>
                    <option value="מצוקה נשימתית">מצוקה נשימתית</option>
                    <option value="אמצעי מתן חמצן">אמצעי מתן חמצן</option>
                    <option value="עקרונות מתן חמצן">עקרונות מתן חמצן</option>
                    <option value="אי-ספיקת כליות">אי-ספיקת כליות</option>
                    <option value="סוכרת וסיבוכים חריפים">סוכרת וסיבוכים חריפים</option>
                    <option value="הפרעות ADH">הפרעות ADH</option>
                    <option value="הלם">הלם</option>
                    <option value="כאב">כאב</option>
                    <option value="סיבוכים פוסט-ניתוחיים">סיבוכים פוסט-ניתוחיים</option>
                    <option value="עירוי דם">עירוי דם</option>
                    <option value="זיהום בדרכי שתן">זיהום בדרכי שתן</option>
                    <option value="הערכה סיעודית">הערכה סיעודית</option>
                    <option value="אסתמה ו-COPD">אסתמה ו-COPD</option>
                    <option value="תרופות סוכרת">תרופות סוכרת</option>
                    <option value="לבלב">לבלב</option>
                </select>
            </div>
            <button id="start-btn" class="btn start-btn">התחל חידון</button>
        </div>
        <div class="nav-links">
            <a href="nutrition-quiz.html" class="nav-link">חידון תזונה ודיאטטיקה</a>
        </div>
    </div>

    <script src="nursing.js"></script>
    <script src="nursing-quiz.js"></script>
</body>
</html>
